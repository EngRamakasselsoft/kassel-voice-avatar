# LiveKit Server Configuration
# Self-hosted for Kassel Academy Voice Avatar System

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

# Keys — must match .env LIVEKIT_API_KEY / LIVEKIT_API_SECRET
keys:
  devkey: secret

# Logging
logging:
  json: false
  level: info

# WebRTC / TURN config (for production, add TURN server)
# turn:
#   enabled: true
#   domain: your-turn-server.com
#   cert_file: /path/to/cert.pem
#   key_file: /path/to/key.pem
#   udp_port: 3478
#   tls_port: 5349

# Room defaults
room:
  auto_create: true
  max_participants: 10
  empty_timeout: 300   # 5 min timeout if room is empty
  departure_timeout: 20

# Limits (increase for 200 concurrent sessions in production)
limit:
  num_tracks: 1000
  bytes_per_sec: 10000000000  # 10 Gbps
